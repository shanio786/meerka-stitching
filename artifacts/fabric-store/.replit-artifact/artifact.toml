kind = "web"
previewPath = "/"
title = "Stitching ERP - Fabric Store"
version = "1.0.0"
id = "artifacts/fabric-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26082

[services.development]
run = "pnpm --filter @workspace/fabric-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fabric-store", "run", "build" ]
publicDir = "artifacts/fabric-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26082"
BASE_PATH = "/"
